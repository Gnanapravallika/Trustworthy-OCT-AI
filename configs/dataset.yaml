# TrustOCT Dataset Configuration File

dataset:
  name: "Kermany OCT2017"

paths:
  train: "datasets/raw/Kermany/train"
  val: "datasets/raw/Kermany/val"
  test: "datasets/raw/Kermany/test"

classes:
  - "CNV"
  - "DME"
  - "DRUSEN"
  - "NORMAL"

image:
  channels: "RGB"
  extensions:
    - ".jpeg"
    - ".jpg"
    - ".png"

loader:
  batch_size: 32
  num_workers: 4
  pin_memory: true
  shuffle: true
